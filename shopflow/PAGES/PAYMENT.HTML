<!doctype html>
<html lang="EN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SIGN IN</title>

    <link rel="stylesheet" href="../CSS/STYLE.CSS" />
  </head>
  <body>
    <div class="background"></div>
    <nav class="navbar">
      <div class="logo">ALL PROJECTS</div>
      <ul class="nav-links">
        <li><a href="../INDEX.html">HOME</a></li>
        <li><a href="REGISTER.HTML">REGISTER</a></li>
        <li><a href="SIGNIN.HTML">SIGN IN</a></li>
        <li><a href="SHOPPING.HTML">SHOPPING</a></li>
        <li><a href="PAYMENT.HTML">PAYMENT</a></li>
      </ul>
    </nav>
    <div class="container">
      <div class="card">
        <h2>PAYMENT</h2>
        <form>
          <input
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            placeholder="CARD NUMBER"
            required
            maxlength="16"
            minlength="16"
          />
          <input type="text" placeholder="CARDHOLDER NAME" required />
          <label>EXPIRATION DATE</label>
          <div class="ROW">
            <select class="EXP-DATE" required>
              <option>01</option>
              <option>02</option>
              <option>03</option>
              <option>04</option>
              <option>05</option>
              <option>06</option>
              <option>07</option>
              <option>08</option>
              <option>09</option>
              <option>10</option>
              <option>11</option>
              <option>12</option>
            </select>
            <select class="EXP-DATE" required>
              <option>2026</option>
              <option>2027</option>
              <option>2028</option>
              <option>2029</option>
              <option>2030</option>
              <option>2031</option>
              <option>2032</option>
              <option>2033</option>
              <option>2034</option>
              <option>2035</option>
              <option>2036</option>
            </select>
            <input
              class="EXP-DATE"
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              placeholder="CVV"
              required
              maxlength="3"
              minlength="3"
            />
          </div>
          <button>PAY NOW</button>
        </form>
      </div>
    </div>
  </body>
</html>
